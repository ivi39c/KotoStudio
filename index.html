<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTO Studio ｜ 小事創意工作室 - 網頁設計與科技整合</title>
    <meta name="description" content="把冰冷的代碼化為日常的溫度。在 KOTO Studio，那些您覺得複雜的科技難題，都只是微不足道的小事。提供客製化網頁設計、網站架設與 LINE 機器人自動化開發。">
    
    <!-- 內建純原生網頁標準 CSS，免網路、免下載、保證不跑版 -->
    <style>
        /* 1. 全域極簡基礎設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif; 
            background-color: #FCFBF9; 
            color: #1C1C1C; 
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }
        
        /* 2. 版面容器公用樣式 */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .section-padding { padding: 90px 0; }
        .text-center { text-align: center; }
        .badge { font-size: 13px; tracking-spacing: 3px; letter-spacing: 3px; color: #8C867A; text-transform: uppercase; font-weight: 500; margin-bottom: 12px; display: block; }
        
        /* 3. 導覽列 Navigation */
        nav { 
            position: fixed; top: 0; left: 0; width: 100%; height: 80px; 
            background-color: rgba(252, 251, 249, 0.9); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-b: 1px solid #EAE6DF; z-index: 1000;
            display: flex; align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.01);
        }
        .nav-container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: 2px; color: #FF6A39; }
        .logo span { font-size: 12px; color: #8C867A; font-weight: 300; letter-spacing: 1px; margin-left: 4px; text-transform: uppercase; }
        .nav-links { display: none; gap: 32px; font-size: 14px; font-weight: 500; letter-spacing: 1px; color: #5C564C; }
        .nav-links a:hover { color: #FF6A39; }
        .nav-btn { background-color: #1C1C1C; color: #fff !important; font-size: 13px; letter-spacing: 2px; padding: 10px 20px; rounded-radius: 50px; border-radius: 50px; font-weight: 500; }
        .nav-btn:hover { background-color: #FF6A39; transform: translateY(-1px); }

        /* 4. 首頁視覺 Hero Section */
        .hero { padding: 180px 0 100px 0; text-align: center; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; top: -100px; left: -100px; width: 300px; height: 300px; background-color: rgba(255,106,57,0.04); border-radius: 50%; filter: blur(80px); z-index: -1; }
        .hero-title { font-size: 36px; font-weight: 300; letter-spacing: 2px; line-height: 1.4; margin-bottom: 24px; color: #1C1C1C; }
        .hero-title span { font-style: italic; color: #FF6A39; font-weight: 400; }
        .hero-desc { font-size: 15px; color: #5C564C; max-width: 650px; margin: 0 auto 40px auto; font-weight: 300; }
        .hero-desc strong { color: #1C1C1C; font-weight: 500; }
        .hero-btns { display: flex; flex-direction: column; gap: 16px; justify-content: center; align-items: center; }
        .btn-primary { background-color: #FF6A39; color: #fff !important; padding: 14px 36px; border-radius: 50px; font-size: 14px; letter-spacing: 2px; box-shadow: 0 4px 14px rgba(255,106,57,0.15); }
        .btn-primary:hover { background-color: #E05526; transform: translateY(-2px); }
        .btn-secondary { border: 1px solid #1C1C1C; color: #1C1C1C !important; padding: 14px 36px; border-radius: 50px; font-size: 14px; letter-spacing: 2px; }
        .btn-secondary:hover { background-color: #1C1C1C; color: #fff !important; transform: translateY(-2px); }

        /* 5. 關於我們 About Section */
        .about { background-color: #F5F2EC; border-top: 1px solid #EAE6DF; border-bottom: 1px solid #EAE6DF; }
        .about-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
        .about-title-box h2 { font-size: 20px; font-weight: 500; letter-spacing: 2px; color: #1C1C1C; margin-top: 4px; }
        .about-title-box .line { width: 32px; height: 2px; background-color: #FF6A39; margin-top: 12px; }
        .about-content { font-size: 15px; color: #4A443C; font-weight: 300; }
        .about-content p { margin-bottom: 20px; }
        .about-content p:last-child { margin-bottom: 0; }
        .about-highlight { color: #1C1C1C; font-weight: 500; font-size: 16px; border-left: 2px solid #FF6A39; padding-left: 16px; margin: 24px 0; }

        /* 6. 精選服務 Services Section */
        .services-title { font-size: 26px; font-weight: 300; letter-spacing: 3px; color: #1C1C1C; margin-top: 4px; }
        .services-grid { display: grid; grid-template-columns: 1fr; gap: 32px; margin-top: 60px; }
        .service-card { background-color: #fff; padding: 40px 32px; border-radius: 16px; border: 1px solid #EAE6DF; transition: all 0.4s ease; text-align: left; }
        .service-card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(140,134,122,0.08); }
        .service-num { width: 48px; height: 48px; border-radius: 12px; font-weight: 700; font-size: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .card-1 .service-num { background-color: rgba(255,106,57,0.08); color: #FF6A39; }
        .card-2 .service-num { background-color: rgba(245,166,35,0.08); color: #F5A623; }
        .card-3 .service-num { background-color: rgba(74,144,226,0.08); color: #4A90E2; }
        .service-card h4 { font-size: 18px; font-weight: 500; letter-spacing: 1px; margin-bottom: 16px; color: #1C1C1C; }
        .service-card p { font-size: 14px; color: #5C564C; font-weight: 300; line-height: 1.7; }

        /* 7. 核心哲學 Philosophy Section */
        .philosophy { background-color: #1C1C1C; color: #fff; text-align: center; position: relative; overflow: hidden; }
        .philosophy::after { content: ''; position: absolute; right: -100px; bottom: -100px; width: 300px; height: 300px; background-color: rgba(255,106,57,0.06); border-radius: 50%; filter: blur(80px); }
        .philosophy h3 { font-size: 22px; font-weight: 300; letter-spacing: 2px; max-width: 700px; margin: 0 auto 24px auto; line-height: 1.6; }
        .philosophy p { font-size: 14px; color: #BEB9B0; max-width: 650px; margin: 0 auto; font-weight: 300; line-height: 1.9; }

        /* 8. 聯絡我們 Contact Section */
        .contact h3 { font-size: 26px; font-weight: 300; letter-spacing: 3px; color: #1C1C1C; }
        .contact-sub { font-size: 14px; color: #5C564C; font-weight: 300; margin: 8px 0 48px 0; }
        .contact-box { background-color: #fff; padding: 48px 24px; border-radius: 24px; border: 1px solid #EAE6DF; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 20px rgba(140,134,122,0.02); }
        .contact-label { font-size: 11px; letter-spacing: 2px; color: #8C867A; font-weight: 500; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .contact-email { font-size: 18px; font-weight: 300; color: #FF6A39; word-break: break-all; text-decoration: underline; display: inline-block; }
        .contact-email:hover { color: #E05526; }
        .divider { width: 100%; height: 1px; background-color: #EAE6DF; margin: 32px 0; }
        .contact-tip { font-size: 12px; color: #8C867A; font-weight: 300; line-height: 1.6; }

        /* 9. 頁尾 Footer */
        footer { background-color: #F5F2EC; border-top: 1px solid #EAE6DF; padding: 48px 0; font-size: 12px; color: #8C867A; letter-spacing: 1px; font-weight: 300; text-align: center; }
        footer p { margin-bottom: 8px; }
        footer p:last-child { margin-bottom: 0; }
        footer span { color: #FF6A39; }

        /* 10. RWD 響應式平板與電腦大螢幕最佳化（大於 768px 自動展開） */
        @media (min-width: 768px) {
            .nav-links { display: flex; }
            .hero-title { font-size: 54px; }
            .hero-btns { flex-direction: row; }
            .about-grid { grid-template-columns: 1fr 2fr; }
            .services-grid { grid-template-columns: repeat(3, 1fr); }
            .philosophy h3 { font-size: 32px; }
            .contact-box { padding: 60px 48px; }
            .contact-email { font-size: 26px; }
        }
    </style>
</head>
<body>

    <!-- 1. 導覽列 Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">KOTO<span>Studio</span></div>
            <div class="nav-links">
                <a href="#about">關於小事</a>
                <a href="#services">精選服務</a>
                <a href="#philosophy">職人精神</a>
                <a href="#contact">聯絡我們</a>
            </div>
            <div>
                <a href="#contact" class="nav-btn">開始把事變小</a>
            </div>
        </div>
    </nav>

    <!-- 2. 首頁視覺 Hero Section -->
    <section class="hero container">
        <span class="badge">Web Design & Digital Integration</span>
        <h1 class="hero-title">
            把冰冷的代碼，化為<br><span>日常的溫度</span>。
        </h1>
        <p class="hero-desc">
            在 <strong>KOTO Studio（小事創意工作室）</strong>，那些您覺得像宇宙大爆炸一樣複雜的科技與網頁難題，來到這裡，都將淬鍊成微不足道的小事。
        </p>
        <div class="hero-btns">
            <a href="#services" class="btn-secondary">探索服務項目</a>
            <a href="#contact" class="btn-primary">線上諮詢提案</a>
        </div>
    </section>

    <!-- 3. 關於我們 About Section -->
    <section id="about" class="about section-padding">
        <div class="container">
            <div class="about-grid">
                <div class="about-title-box">
                    <span class="badge">About Us</span>
                    <h2>關於小事創意</h2>
                    <div class="line"></div>
                </div>
                <div class="about-content">
